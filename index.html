<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Do you want to get food?</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #101357;
      --card:      #1a1f6e;
      --text:      #f0ece4;
      --muted:     #8a90c8;
      --accent:    #fbaf08;
      --yes:       #007f4f;
      --yes-light: #e0f2eb;
      --no:        #fea49f;
      --no-dark:   #c0302a;
      --teal:      #00a0a0;
      --border:    #2a3080;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── INTRO ── */
    #intro {
      text-align: center;
      max-width: 440px;
    }

    #intro h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 11vw, 4.8rem);
      letter-spacing: 2px;
      color: var(--accent);
      line-height: 1.05;
      margin-bottom: 14px;
    }

    #intro p {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 36px;
      line-height: 1.6;
      font-style: italic;
    }

    .btn-start {
      background: var(--accent);
      color: #101357;
      border: none;
      padding: 16px 48px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 4px;
      transition: transform 0.1s, opacity 0.1s;
    }
    .btn-start:hover  { opacity: 0.9; transform: scale(1.02); }
    .btn-start:active { transform: scale(0.98); }

    /* ── RATER ── */
    #rater {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 480px;
    }

    .progress-bar-wrap {
      width: 100%;
      background: var(--card);
      border-radius: 99px;
      height: 6px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--teal);
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .counter {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .card {
      width: 100%;
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .card img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }

    .card-label {
      padding: 16px 20px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 1px;
      color: var(--text);
      text-align: center;
    }

    .buttons {
      display: flex;
      gap: 16px;
      margin-top: 24px;
      width: 100%;
    }

    .btn-no, .btn-yes {
      flex: 1;
      padding: 18px;
      border: none;
      border-radius: 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }

    .btn-no  { background: var(--no);        color: var(--no-dark); }
    .btn-yes { background: var(--yes-light);  color: var(--yes); }
    .btn-no:hover,  .btn-yes:hover  { opacity: 0.9; transform: scale(1.02); }
    .btn-no:active, .btn-yes:active { transform: scale(0.97); }

    /* ── RESULTS ── */
    #results {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    #results h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 9vw, 3.5rem);
      color: var(--accent);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    #results p.sub {
      color: var(--muted);
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    .results-list {
      background: var(--card);
      border-radius: 12px;
      padding: 20px 24px;
      width: 100%;
      text-align: left;
      margin-bottom: 16px;
      max-height: 260px;
      overflow-y: auto;
    }

    .results-list li {
      list-style: none;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .results-list li:last-child { border-bottom: none; }
    .results-list li::before {
      content: '✓';
      color: var(--teal);
      font-weight: 700;
      flex-shrink: 0;
    }

    .empty-state {
      color: var(--muted);
      font-style: italic;
      padding: 16px 0;
      text-align: center;
      width: 100%;
    }

    .btn-copy {
      background: var(--accent);
      color: #101357;
      border: none;
      padding: 14px 36px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 8px;
      margin-bottom: 10px;
      transition: transform 0.1s, opacity 0.1s;
      width: 100%;
    }
    .btn-copy:hover  { opacity: 0.9; }
    .btn-copy:active { transform: scale(0.98); }

    .copied-msg {
      font-size: 0.85rem;
      color: var(--teal);
      margin-bottom: 24px;
      min-height: 20px;
    }

    /* ── OVERLAP SECTION ── */
    .overlap-section {
      width: 100%;
      border-top: 1px solid var(--border);
      padding-top: 24px;
      margin-bottom: 16px;
    }

    .overlap-section h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 6px;
      text-align: center;
    }

    .overlap-section p.hint {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 12px;
      text-align: center;
      line-height: 1.5;
    }

    textarea {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      padding: 14px 16px;
      resize: vertical;
      min-height: 120px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 12px;
    }
    textarea:focus { border-color: var(--teal); }
    textarea::placeholder { color: var(--muted); }

    .btn-compare {
      background: var(--teal);
      color: #fff;
      border: none;
      padding: 14px 36px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 8px;
      width: 100%;
      margin-bottom: 16px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-compare:hover  { opacity: 0.9; }
    .btn-compare:active { transform: scale(0.98); }

    /* overlap results */
    .overlap-results {
      width: 100%;
      display: none;
    }

    .overlap-results h4 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 1px;
      color: var(--no);
      margin-bottom: 10px;
      text-align: center;
    }

    .overlap-list {
      background: var(--card);
      border-radius: 12px;
      padding: 16px 20px;
      width: 100%;
      text-align: left;
      max-height: 260px;
      overflow-y: auto;
      margin-bottom: 8px;
    }

    .overlap-list li {
      list-style: none;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .overlap-list li:last-child { border-bottom: none; }
    .overlap-list li::before {
      content: '♥';
      color: var(--no);
      flex-shrink: 0;
    }

    .overlap-count {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 16px;
    }

    /* ── RESTART ── */
    .btn-restart {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 12px 36px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: 8px;
      width: 100%;
      margin-top: 8px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-restart:hover { border-color: var(--text); color: var(--text); }

    /* ── FLASH ANIMATIONS ── */
    @keyframes flashYes {
      0%   { background: var(--card); }
      40%  { background: #0d4a35; }
      100% { background: var(--card); }
    }
    @keyframes flashNo {
      0%   { background: var(--card); }
      40%  { background: #5a1a1a; }
      100% { background: var(--card); }
    }
    .flash-yes { animation: flashYes 0.35s ease; }
    .flash-no  { animation: flashNo 0.35s ease; }
  </style>
</head>
<body>

  <!-- INTRO -->
  <div id="intro">
    <h1>Do you want to get food?</h1>
    <p>Saving relationships one yes or no at a time.</p>
    <button class="btn-start" onclick="startRating()">Let's Go</button>
  </div>

  <!-- RATER -->
  <div id="rater">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="counter" id="counter">1 / 80</div>
    <div class="card" id="card">
      <img id="foodImg" src="" alt="" />
      <div class="card-label" id="foodLabel"></div>
    </div>
    <div class="buttons">
      <button class="btn-no"  onclick="rate(false)">✕ No</button>
      <button class="btn-yes" onclick="rate(true)">✓ Yes</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results">
    <h2>Your Yeses</h2>
    <p class="sub" id="resultsCount"></p>
    <ul class="results-list" id="resultsList"></ul>

    <button class="btn-copy" onclick="copyList()">Copy My List</button>
    <div class="copied-msg" id="copiedMsg"></div>

    <!-- OVERLAP -->
    <div class="overlap-section">
      <h3>Find Your Overlap</h3>
      <p class="hint">Paste your partner's list below to see what you both said yes to.</p>
      <textarea id="partnerInput" placeholder="Paste their list here..."></textarea>
      <button class="btn-compare" onclick="compareList()">Show Overlap</button>

      <div class="overlap-results" id="overlapResults">
        <h4>You Both Want...</h4>
        <ul class="overlap-list" id="overlapList"></ul>
        <p class="overlap-count" id="overlapCount"></p>
      </div>
    </div>

    <button class="btn-restart" onclick="restart()">Start Over</button>
  </div>

  <script>
    const foods = [
      { file: "1 - Fried Chicken.png",       label: "Fried Chicken" },
      { file: "2 - Beef Burger.png",          label: "Beef Burger" },
      { file: "3 - Aussie Burger.png",        label: "Aussie Burger" },
      { file: "4 - Chicken Burger.png",        label: "Chicken Burger" },
      { file: "5 - Schnitzel.png",            label: "Schnitzel" },
      { file: "6 - Parmie.png",               label: "Parmie" },
      { file: "7 - Steak.png",                label: "Steak" },
      { file: "8 - Chips.png",                label: "Chips" },
      { file: "9 - Wedges.png",               label: "Wedges" },
      { file: "10 - Wings.png",               label: "Wings" },
      { file: "11 - Meatlovers.png",          label: "Meatlovers Pizza" },
      { file: "12 - Woodfired Pizza.png",     label: "Woodfired Pizza" },
      { file: "13 - Curry.png",               label: "Curry" },
      { file: "14 - Souvlaki.png",            label: "Souvlaki" },
      { file: "15 - Kebab.png",               label: "Kebab" },
      { file: "16 - tacos.png",               label: "Tacos" },
      { file: "17 - Sweet Potato Chips.png",  label: "Sweet Potato Chips" },
      { file: "18 - Pad See Ew.png",          label: "Pad See Ew" },
      { file: "19 - Pad Thai.png",            label: "Pad Thai" },
      { file: "20 - Pho.png",                 label: "Pho" },
      { file: "21 - Nachos.png",              label: "Nachos" },
      { file: "22 - Banh Mi.png",             label: "Banh Mi" },
      { file: "23 - Club Sandwhich.png",      label: "Club Sandwich" },
      { file: "24 - Vietnamese.png",          label: "Vietnamese" },
      { file: "25 - Creamy Pasta.png",        label: "Creamy Pasta" },
      { file: "26 - Tomato Pasta.png",        label: "Tomato Pasta" },
      { file: "27 - Sushi.png",               label: "Sushi" },
      { file: "28 - Sushi Taco.png",          label: "Sushi Taco" },
      { file: "29 - Sausage roll.png",        label: "Sausage Roll" },
      { file: "30 - Meat Pie.png",            label: "Meat Pie" },
      { file: "31 - B&E Roll.png",            label: "B&E Roll" },
      { file: "32 - Lasagne.png",             label: "Lasagne" },
      { file: "33 - Asian Greens.png",        label: "Asian Greens" },
      { file: "34 - Fish and Chips.png",      label: "Fish and Chips" },
      { file: "35 - Charcoal Chicken.png",    label: "Charcoal Chicken" },
      { file: "36 - Shish Meat.png",          label: "Shish Meat" },
      { file: "37 - Mongolian Lamb.png",      label: "Mongolian Lamb" },
      { file: "38 - Honey Chicken.png",       label: "Honey Chicken" },
      { file: "39 - Burrito.png",             label: "Burrito" },
      { file: "40 - Chicken Tenders.png",     label: "Chicken Tenders" },
      { file: "41 - Salmon bagel.png",        label: "Salmon Bagel" },
      { file: "42 - Dumplings.png",           label: "Dumplings" },
      { file: "43 - Mixed Dips.png",          label: "Mixed Dips" },
      { file: "44 - Hotdgog.png",             label: "Hotdog" },
      { file: "45 - Don Bowl.png",            label: "Don Bowl" },
      { file: "46 - Bibimbap.png",            label: "Bibimbap" },
      { file: "47 - Rice w Egg.png",          label: "Rice w Egg" },
      { file: "48 - Reuben.png",              label: "Reuben" },
      { file: "49 - Paella.png",              label: "Paella" },
      { file: "50 - Laksa.png",               label: "Laksa" },
      { file: "51 - Beef Salad.png",          label: "Beef Salad" },
      { file: "52- Slaw.png",                 label: "Slaw" },
      { file: "53 - Seafood.png",             label: "Seafood" },
      { file: "54 - Pumpkin Soup.png",        label: "Pumpkin Soup" },
      { file: "55 - BBQ.png",                 label: "BBQ" },
      { file: "56 - Quiche.png",              label: "Quiche" },
      { file: "57 - Toasty.png",              label: "Toasty" },
      { file: "58 - Grilled Octopus.png",     label: "Grilled Octopus" },
      { file: "59 - Gozleme.png",             label: "Gozleme" },
      { file: "60 - Sausage.png",             label: "Sausage" },
      { file: "61 - Crackers and Cheese.png", label: "Crackers and Cheese" },
      { file: "62 - Okonamayaki.png",         label: "Okonomiyaki" },
      { file: "63 - San Choy Bow.png",        label: "San Choy Bow" },
      { file: "64 - Squid.png",               label: "Squid" },
      { file: "65 - Beans on Toast.png",      label: "Beans on Toast" },
      { file: "66 - Stew.png",                label: "Stew" },
      { file: "67 - Meat and 3 Veg.png",      label: "Meat and 3 Veg" },
      { file: "68 - Peking Duck.png",         label: "Peking Duck" },
      { file: "69 - Pork Knuckle.png",        label: "Pork Knuckle" },
      { file: "70 - Big Brekky.png",          label: "Big Brekky" },
      { file: "71 - baked potato.png",        label: "Baked Potato" },
      { file: "72 - Corn Fritters.png",       label: "Corn Fritters" },
      { file: "73 Ramen.png",                 label: "Ramen" },
      { file: "74 - Bruschetta.png",          label: "Bruschetta" },
      { file: "75 - Halloumi.png",            label: "Halloumi" },
      { file: "76 - Gnochhi.png",             label: "Gnocchi" },
      { file: "77 - Chicken Wrap.png",        label: "Chicken Wrap" },
      { file: "78 - Stroganoff.png",          label: "Stroganoff" },
      { file: "79 - Focaccia sandy.png",      label: "Focaccia Sandwich" },
      { file: "80 - GB.png",                  label: "GB" },
    ];

    let current = 0;
    let yeses = [];

    function startRating() {
      document.getElementById('intro').style.display = 'none';
      document.getElementById('rater').style.display = 'flex';
      loadCard();
    }

    function loadCard() {
      const food = foods[current];
      document.getElementById('foodImg').src = food.file;
      document.getElementById('foodImg').alt = food.label;
      document.getElementById('foodLabel').textContent = food.label;
      document.getElementById('counter').textContent = `${current + 1} / ${foods.length}`;
      document.getElementById('progressFill').style.width = `${(current / foods.length) * 100}%`;

      // Preload the next image so it's ready before the user gets there
      if (current + 1 < foods.length) {
        const preload = new Image();
        preload.src = foods[current + 1].file;
      }
    }

    function rate(isYes) {
      if (isYes) yeses.push(foods[current].label);

      const card = document.getElementById('card');
      card.classList.remove('flash-yes', 'flash-no');
      void card.offsetWidth;
      card.classList.add(isYes ? 'flash-yes' : 'flash-no');

      current++;
      if (current >= foods.length) {
        setTimeout(showResults, 300);
      } else {
        setTimeout(loadCard, 150);
      }
    }

    function showResults() {
      document.getElementById('rater').style.display = 'none';
      document.getElementById('results').style.display = 'flex';

      const list = document.getElementById('resultsList');
      list.innerHTML = '';

      if (yeses.length === 0) {
        list.innerHTML = '<li class="empty-state">Nothing selected — tough crowd!</li>';
      } else {
        yeses.forEach(name => {
          const li = document.createElement('li');
          li.textContent = name;
          list.appendChild(li);
        });
      }

      document.getElementById('resultsCount').textContent =
        `${yeses.length} of ${foods.length} foods made the cut`;
    }

    function copyList() {
      const text = yeses.length > 0 ? yeses.join('\n') : '(no selections)';
      navigator.clipboard.writeText(text).then(() => {
        const msg = document.getElementById('copiedMsg');
        msg.textContent = 'Copied to clipboard!';
        setTimeout(() => msg.textContent = '', 2500);
      });
    }

    function compareList() {
      const raw = document.getElementById('partnerInput').value;

      // Parse partner's list — split by newlines, strip bullets/checkmarks/whitespace
      const partnerItems = raw
        .split('\n')
        .map(line => line.replace(/^[\s✓•\-\*]+/, '').trim())
        .filter(line => line.length > 0)
        .map(line => line.toLowerCase());

      // Find overlap (case-insensitive)
      const overlap = yeses.filter(item =>
        partnerItems.includes(item.toLowerCase())
      );

      const overlapResults = document.getElementById('overlapResults');
      const overlapList = document.getElementById('overlapList');
      const overlapCount = document.getElementById('overlapCount');

      overlapList.innerHTML = '';
      overlapResults.style.display = 'block';

      if (overlap.length === 0) {
        overlapList.innerHTML = '<li class="empty-state">No overlap found — keep negotiating!</li>';
        overlapCount.textContent = '';
      } else {
        overlap.forEach(name => {
          const li = document.createElement('li');
          li.textContent = name;
          overlapList.appendChild(li);
        });
        overlapCount.textContent = `${overlap.length} food${overlap.length !== 1 ? 's' : ''} in common`;
      }

      overlapResults.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function restart() {
      current = 0;
      yeses = [];
      document.getElementById('partnerInput').value = '';
      document.getElementById('overlapResults').style.display = 'none';
      document.getElementById('results').style.display = 'none';
      document.getElementById('intro').style.display = 'block';
    }
  </script>
</body>
</html>
